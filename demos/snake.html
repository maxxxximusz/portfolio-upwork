<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050508;display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100vh;font-family:'Segoe UI',sans-serif;color:#e2e8f0;overflow:hidden;}
#score{font-size:.85rem;color:#7c3aed;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
#canvas{border:1px solid rgba(124,58,237,.25);border-radius:8px;}
#msg{margin-top:12px;font-size:.78rem;color:#475569;letter-spacing:.5px;}
</style>
</head>
<body>
<div id="score">Score: <span id="s">0</span> &nbsp;|&nbsp; Best: <span id="b">0</span></div>
<canvas id="canvas" width="300" height="300"></canvas>
<div id="msg">Arrow keys / WASD — Press any to start</div>
<script>
const cv = document.getElementById('canvas');
const cx = cv.getContext('2d');
const CELL = 15, COLS = 20, ROWS = 20;
let snake, dir, next, food, score, best=0, running=false, loop;

function rand(n){ return Math.floor(Math.random()*n); }
function placeFood(){
  let f;
  do { f={x:rand(COLS),y:rand(ROWS)}; }
  while(snake.some(s=>s.x===f.x&&s.y===f.y));
  return f;
}
function init(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0}; next={x:1,y:0};
  score=0; document.getElementById('s').textContent=0;
  food=placeFood(); running=true;
  document.getElementById('msg').textContent='';
  clearInterval(loop); loop=setInterval(tick,110);
}
function tick(){
  dir=next;
  const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    running=false; clearInterval(loop);
    if(score>best){ best=score; document.getElementById('b').textContent=best; }
    document.getElementById('msg').textContent=`Game Over! Score: ${score}  — Press any key to restart`;
    return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score++; document.getElementById('s').textContent=score; food=placeFood();
  } else { snake.pop(); }
  render();
}
function render(){
  cx.fillStyle='#050508'; cx.fillRect(0,0,300,300);
  // grid
  cx.strokeStyle='rgba(255,255,255,.03)';
  for(let i=0;i<=COLS;i++){ cx.beginPath();cx.moveTo(i*CELL,0);cx.lineTo(i*CELL,300);cx.stroke(); }
  for(let i=0;i<=ROWS;i++){ cx.beginPath();cx.moveTo(0,i*CELL);cx.lineTo(300,i*CELL);cx.stroke(); }
  // food
  cx.fillStyle='#f43f5e';
  cx.beginPath(); cx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-1,0,Math.PI*2); cx.fill();
  cx.fillStyle='rgba(244,63,94,.2)';
  cx.beginPath(); cx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2+3,0,Math.PI*2); cx.fill();
  // snake
  snake.forEach((s,i)=>{
    const t=1-i/snake.length;
    cx.fillStyle=i===0?'#a78bfa':`rgba(124,58,237,${.3+t*.7})`;
    cx.beginPath();
    cx.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,i===0?5:3);
    cx.fill();
  });
}
// initial render
(function firstDraw(){
  cx.fillStyle='#050508'; cx.fillRect(0,0,300,300);
  cx.fillStyle='rgba(124,58,237,.15)'; cx.fillRect(0,0,300,300);
  cx.font='bold 16px Segoe UI'; cx.fillStyle='#a78bfa'; cx.textAlign='center';
  cx.fillText('SNAKE',150,140);
  cx.font='11px Segoe UI'; cx.fillStyle='#475569';
  cx.fillText('Press any key to start',150,162);
})();
document.addEventListener('keydown',e=>{
  const k=e.key;
  if(!running){ init(); return; }
  if((k==='ArrowUp'||k==='w')&&dir.y!==1) next={x:0,y:-1};
  if((k==='ArrowDown'||k==='s')&&dir.y!==-1) next={x:0,y:1};
  if((k==='ArrowLeft'||k==='a')&&dir.x!==1) next={x:-1,y:0};
  if((k==='ArrowRight'||k==='d')&&dir.x!==-1) next={x:1,y:0};
  e.preventDefault();
});
cv.addEventListener('click',()=>{ if(!running) init(); });
</script>
</body>
</html>
