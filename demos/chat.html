<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050508;font-family:'Segoe UI',sans-serif;color:#e2e8f0;
  height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.header{padding:14px 16px;background:rgba(124,58,237,.08);border-bottom:1px solid rgba(124,58,237,.15);
  display:flex;align-items:center;gap:10px;}
.jarvis-dot{width:8px;height:8px;border-radius:50%;background:#a78bfa;animation:pulse 1.5s infinite;}
@keyframes pulse{50%{opacity:.2;transform:scale(1.5)}}
.header-text{font-size:.82rem;font-weight:600;color:#a78bfa;letter-spacing:.5px;}
.header-sub{font-size:.68rem;color:#475569;margin-top:1px;}
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:#3f3f5a;border-radius:3px;}
.msg{display:flex;gap:8px;align-items:flex-end;max-width:85%;}
.msg.user{flex-direction:row-reverse;align-self:flex-end;}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:.75rem;flex-shrink:0;}
.av-j{background:linear-gradient(135deg,#7c3aed,#4c1d95);}
.av-u{background:linear-gradient(135deg,#06b6d4,#0369a1);}
.bubble{padding:9px 14px;border-radius:14px;font-size:.8rem;line-height:1.55;max-width:100%;}
.msg.jarvis .bubble{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.2);
  color:#c4b5fd;border-radius:14px 14px 14px 3px;}
.msg.user .bubble{background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.2);
  color:#a5f3fc;border-radius:14px 14px 3px 14px;}
.typing span{display:inline-block;width:5px;height:5px;background:#a78bfa;
  border-radius:50%;margin:0 2px;animation:ty .8s infinite;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes ty{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.input-row{display:flex;gap:8px;padding:10px 14px;border-top:1px solid rgba(255,255,255,.05);}
#inp{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;padding:8px 12px;color:#e2e8f0;font-size:.8rem;outline:none;
  font-family:inherit;}
#inp:focus{border-color:rgba(124,58,237,.4);}
#inp::placeholder{color:#334155;}
#send{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;border:none;
  border-radius:8px;padding:8px 14px;font-size:.8rem;cursor:pointer;font-weight:600;}
#send:hover{opacity:.85;}
</style>
</head>
<body>
<div class="header">
  <div class="jarvis-dot"></div>
  <div><div class="header-text">JARVIS AI</div><div class="header-sub">Powered by Claude · Online</div></div>
</div>
<div class="msgs" id="msgs"></div>
<div class="input-row">
  <input id="inp" placeholder="Ask JARVIS anything…" autocomplete="off">
  <button id="send">Send</button>
</div>
<script>
const replies = {
  "hello": "Hello! JARVIS online. How can I assist you today?",
  "hi": "Hey there! Ready to help. What do you need?",
  "what can you do": "I can answer questions, open apps, tell the time, control your music, and much more. I'm integrated with the Claude AI API for intelligent responses.",
  "who built you": "I was built by Max Dmytrov — a game and AI developer. He integrated Anthropic's Claude API with Windows Speech Recognition for a fully voice-activated assistant.",
  "what is your name": "I'm JARVIS — Just A Rather Very Intelligent System. Built with C# .NET 9 and Claude AI.",
  "open notepad": "Opening Notepad now. (In the real app, this would launch notepad.exe instantly)",
  "what time is it": `It's currently ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}. Your clock is ticking!`,
  "tell me a joke": "Why do programmers prefer dark mode? Because light attracts bugs! 😄",
  "default": "Understood. Processing your request through the Claude AI engine… In the full version, I'd give you a real-time AI response here."
};
const msgs = document.getElementById('msgs');

function addMsg(text, who){
  const d=document.createElement('div');
  d.className=`msg ${who}`;
  const av=document.createElement('div');
  av.className=`avatar ${who==='jarvis'?'av-j':'av-u'}`;
  av.textContent=who==='jarvis'?'J':'U';
  const b=document.createElement('div');
  b.className='bubble'; b.textContent=text;
  d.appendChild(av); d.appendChild(b);
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
}
function typing(){
  const d=document.createElement('div');
  d.className='msg jarvis'; d.id='typing';
  const av=document.createElement('div');
  av.className='avatar av-j'; av.textContent='J';
  const b=document.createElement('div');
  b.className='bubble typing';
  b.innerHTML='<span></span><span></span><span></span>';
  d.appendChild(av); d.appendChild(b);
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
  return d;
}
function getReply(q){
  const k=q.toLowerCase();
  for(const key in replies){ if(k.includes(key)) return replies[key]; }
  return replies.default;
}
function send(){
  const v=document.getElementById('inp').value.trim();
  if(!v) return;
  addMsg(v,'user');
  document.getElementById('inp').value='';
  const t=typing();
  setTimeout(()=>{ t.remove(); addMsg(getReply(v),'jarvis'); },900+Math.random()*600);
}
document.getElementById('send').addEventListener('click',send);
document.getElementById('inp').addEventListener('keydown',e=>{ if(e.key==='Enter') send(); });
// starter
setTimeout(()=>addMsg('JARVIS online. Voice and text mode active. How can I help?','jarvis'),400);
setTimeout(()=>addMsg('Try asking: "What can you do?" or "Tell me a joke"','jarvis'),1200);
</script>
</body>
</html>
